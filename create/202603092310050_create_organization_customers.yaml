databaseChangeLog:
  - changeSet:
      id: 001-create-organization-customers
      author: gevorg
      changes:
        - createTable:
            tableName: organization_customers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: organization_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: customer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            constraintName: fk_organization_customers_organization
            baseTableName: organization_customers
            baseColumnNames: organization_id
            referencedTableName: organizations
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_organizations_customers_customer
            baseTableName: organization_customers
            baseColumnNames: customer_id
            referencedTableName: customers
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addUniqueConstraint:
            constraintName: uq_organizations_customers_ids
            tableName: organization_customers
            columnNames: organization_id, customer_id
      rollback:
        - dropTable:
            tableName: organization_customers