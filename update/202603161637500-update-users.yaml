databaseChangeLog:
  - changeSet:
      id: 001-update-users
      author: gevorg
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: uuid
                  type: BIGINT

        - addUniqueConstraint:
            tableName: users
            columnNames: uuid
            constraintName: uq_users_uuid

      rollback:
        - dropUniqueConstraint:
            tableName: users
            constraintName: uq_users_uuid

        - dropColumn:
            tableName: users
            columnName: uuid